<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background with zig-zag bottom -->
  <path d="M 20 5 
           L 85 5 
           C 90 5, 90 10, 90 15 
           L 90 95 
           L 80 90 L 70 95 L 60 90 L 50 95 L 40 90 L 30 95 L 20 90 
           L 20 5 Z" 
        fill="#f4efe2" />
  
  <!-- Right shadow/edge -->
  <path d="M 85 5 C 90 5, 90 10, 90 15 L 90 95 L 80 90 L 80 5 Z" fill="#e3dbcb" />

  <!-- Left Green Binding -->
  <rect x="5" y="5" width="15" height="75" rx="5" fill="#4caf50" />

  <!-- "BILL" Text -->
  <text x="25" y="32" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#f58a36">BILL</text>
  
  <!-- "$" Sign -->
  <text x="70" y="32" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#4caf50">$</text>

  <!-- Horizontal lines (simulating text) -->
  <rect x="25" y="45" width="40" height="4" rx="2" fill="#666666" />
  <rect x="70" y="45" width="15" height="4" rx="2" fill="#666666" />

  <rect x="25" y="55" width="40" height="4" rx="2" fill="#666666" />
  <rect x="70" y="55" width="15" height="4" rx="2" fill="#666666" />

  <rect x="25" y="65" width="40" height="4" rx="2" fill="#666666" />
  <rect x="70" y="65" width="15" height="4" rx="2" fill="#666666" />

  <rect x="25" y="75" width="40" height="4" rx="2" fill="#666666" />
</svg>
